<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>やさいえいご クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
    background: linear-gradient(160deg, #e8f5e9 0%, #fff9c4 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }

  #app {
    background: white;
    border-radius: 28px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    text-align: center;
  }

  .rabbit {
    font-size: 64px;
    animation: bounce 1.2s ease-in-out infinite;
    display: inline-block;
    margin-bottom: 4px;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* ── スタート画面 ── */
  #start h2 { font-size: 22px; color: #2e7d32; margin: 16px 0 8px; }
  #start p  { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.7; }
  .mode-btn {
    display: block; width: 100%;
    border: none; border-radius: 20px;
    padding: 18px; font-size: 20px; font-weight: bold;
    cursor: pointer; font-family: inherit;
    margin-bottom: 12px;
    transition: transform 0.1s;
  }
  .mode-btn:hover { transform: scale(1.03); }
  .mode-btn.easy {
    background: linear-gradient(135deg, #a5d6a7, #66bb6a);
    color: white;
    box-shadow: 0 4px 12px rgba(76,175,80,0.3);
  }
  .mode-btn.hard {
    background: linear-gradient(135deg, #ef9a9a, #e53935);
    color: white;
    box-shadow: 0 4px 12px rgba(229,57,53,0.3);
  }

  /* ── クイズ画面 ── */
  .bubble {
    background: #f0f8ff;
    border: 2px solid #90caf9;
    border-radius: 20px;
    padding: 12px 16px;
    font-size: 15px;
    color: #1a237e;
    margin: 0 auto 20px;
    max-width: 320px;
    position: relative;
    line-height: 1.6;
  }
  .bubble::after {
    content: "";
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-bottom-color: #90caf9;
  }

  .progress {
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px;
    background: #e0e0e0;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #66bb6a, #ffca28);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  #quiz-image {
    width: 150px; height: 150px;
    object-fit: contain;
    margin: 0 auto 12px;
    display: none;
    border-radius: 16px;
    border: 2px solid #e0e0e0;
  }
  #quiz-emoji {
    font-size: 100px;
    line-height: 1;
    margin: 0 auto 12px;
    display: none;
  }

  .question-word {
    font-size: 48px;
    font-weight: bold;
    color: #2e7d32;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .speak-btn {
    background: #e3f2fd;
    border: 2px solid #90caf9;
    border-radius: 99px;
    padding: 7px 20px;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 16px;
    font-family: inherit;
    transition: transform 0.1s;
  }
  .speak-btn:hover { transform: scale(1.05); }

  .question-sub {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 24px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice-btn {
    background: #fffde7;
    border: 2px solid #ffe082;
    border-radius: 16px;
    padding: 14px 12px;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .choice-btn:hover:not(:disabled) {
    background: #fff8e1;
    transform: scale(1.03);
  }
  .choice-btn.correct {
    background: #c8e6c9;
    border-color: #66bb6a;
    animation: pop 0.3s ease;
  }
  .choice-btn.wrong {
    background: #ffcdd2;
    border-color: #ef9a9a;
    animation: shake 0.3s ease;
  }
  @keyframes pop  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .feedback {
    min-height: 64px;
    font-size: 15px;
    line-height: 1.7;
    color: #333;
    margin-bottom: 16px;
    padding: 12px;
    border-radius: 14px;
    background: #f9f9f9;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .big { font-size: 22px; margin-bottom: 4px; }

  .next-btn {
    display: none;
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    border: none;
    border-radius: 99px;
    padding: 14px 40px;
    font-size: 18px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(76,175,80,0.35);
    transition: transform 0.1s;
  }
  .next-btn:hover { transform: scale(1.04); }
  .next-btn.show { display: inline-block; }

  #result { display: none; }
  #result .big-emoji { font-size: 80px; margin-bottom: 8px; }
  #result h2 { font-size: 26px; color: #2e7d32; margin-bottom: 12px; }
  #result p  { font-size: 16px; color: #555; margin-bottom: 24px; line-height: 1.7; }
  #result .score { font-size: 40px; font-weight: bold; color: #ff8f00; margin: 8px 0 20px; }
  .restart-btn {
    background: linear-gradient(135deg, #ffca28, #ffa000);
    color: white;
    border: none;
    border-radius: 99px;
    padding: 14px 40px;
    font-size: 18px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(255,160,0,0.35);
  }
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div id="start">
    <div class="rabbit">🐰</div>
    <h2>やさいえいご クイズ</h2>
    <p>むずかしさをえらんでね！</p>
    <button class="mode-btn easy" onclick="startGame('easy')">🌱 かんたん<br><small style="font-size:13px;font-weight:normal">えをみながらこたえよう</small></button>
    <button class="mode-btn hard" onclick="startGame('hard')">🔥 むずかしい<br><small style="font-size:13px;font-weight:normal">えなしでちょうせん！</small></button>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz" style="display:none">
    <div class="rabbit">🐰</div>
    <div class="bubble" id="bubble"></div>
    <div class="progress" id="progress">もんだい 1 / 5</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar"></div></div>
    <img id="quiz-image" src="" alt="" style="display:none">
    <div id="quiz-emoji"></div>
    <div class="question-word" id="word"></div>
    <button class="speak-btn" id="speakBtn">🔊 もういちど きく</button>
    <div class="question-sub">きいて、えらんでね！</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">つぎへ ▶</button>
  </div>

  <!-- 結果画面 -->
  <div id="result">
    <div class="big-emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <div class="score" id="resultScore"></div>
    <p id="resultMsg"></p>
    <button class="restart-btn" onclick="restart()">もういちど あそぶ 🔄</button>
  </div>
</div>

<script>
let mode = "easy";

function playCorrectSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [523, 659, 784, 1047].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.1 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.4);
    o.start(ctx.currentTime + i * 0.1);
    o.stop(ctx.currentTime + i * 0.1 + 0.4);
  });
}

// かんたんモード用（メジャー野菜8種＋画像パス）
const easyWords = ["carrot","tomato","potato","cucumber","onion","corn","eggplant","cabbage"];
const emojiMap = {
  carrot:   "🥕",
  tomato:   "🍅",
  potato:   "🥔",
  cucumber: "🥒",
  onion:    "🧅",
  corn:     "🌽",
  eggplant: "🍆",
  cabbage:  "🥬"
};
const easyData = allQuizData
  .filter(q => easyWords.includes(q.word))
  .map(q => ({ ...q, emoji: emojiMap[q.word] }));

const QUESTIONS_PER_GAME = 5;
let quizData = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function pickQuestions() {
  const pool = mode === "easy" ? easyData : allQuizData;
  quizData = shuffle(pool).slice(0, QUESTIONS_PER_GAME);
}

function startGame(selectedMode) {
  mode = selectedMode;
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  current = 0;
  score = 0;
  pickQuestions();
  renderQuestion();
}

function speakWord(word) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = "en-US";
  speechSynthesis.speak(utter);
}

function renderQuestion() {
  const q = quizData[current];
  answered = false;

  document.getElementById("progress").textContent = `もんだい ${current + 1} / ${quizData.length}`;
  document.getElementById("bar").style.width = `${(current + 1) / quizData.length * 100}%`;
  document.getElementById("word").textContent = q.word;
  document.getElementById("bubble").textContent = q.hint;

  const emojiEl = document.getElementById("quiz-emoji");
  if (mode === "easy") {
    emojiEl.textContent = q.emoji;
    emojiEl.style.display = "block";
  } else {
    emojiEl.style.display = "none";
  }

  document.getElementById("speakBtn").onclick = () => speakWord(q.word);

  const feedback = document.getElementById("feedback");
  feedback.className = "feedback";
  feedback.innerHTML = "";

  document.getElementById("nextBtn").className = "next-btn";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  shuffle(q.choices).forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = c;
    btn.onclick = () => selectAnswer(c, btn);
    choicesEl.appendChild(btn);
  });

  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(q.word);
  utter.lang = "en-US";
  speechSynthesis.speak(utter);
}

function selectAnswer(selected, btn) {
  if (answered) return;
  answered = true;

  const q = quizData[current];
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);

  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("nextBtn");

  if (selected === q.answer) {
    score++;
    btn.classList.add("correct");
    playCorrectSound();
    const kanaLine = mode === "easy" ? `<br>よみかた：${q.kana}` : "";
    feedback.innerHTML = `<div class="big">${q.praise}</div>🌱 ちしき：${q.fact}${kanaLine}`;
    document.getElementById("bubble").textContent = "すごい！せいかい！🎉";
  } else {
    btn.classList.add("wrong");
    new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
    document.querySelectorAll(".choice-btn").forEach(b => {
      if (b.textContent === q.answer) b.classList.add("correct");
    });
    feedback.innerHTML = `<div class="big">ざんねん…もうすこし！💪</div>💡 ヒント：${q.hint}<br>こたえは「${q.answer}」だよ！`;
    document.getElementById("bubble").textContent = "つぎはきっとだいじょうぶ！がんばれ！";
  }

  feedback.classList.add("show");
  nextBtn.classList.add("show");
  nextBtn.textContent = current === quizData.length - 1 ? "けっかをみる 🏆" : "つぎへ ▶";
}

function nextQuestion() {
  current++;
  if (current < quizData.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";

  const total = quizData.length;
  const pct = score / total;
  const r = pct === 1
    ? { emoji: "🏆", title: "かんぺき！すごい！",    msg: `${total}もんぜんぶせいかい！きみはやさいえいごはかせだ！🥕🍅🌽` }
    : pct >= 0.6
    ? { emoji: "😊", title: "よくがんばったね！",    msg: `${score}もんせいかい！もう1かいやれば、もっとうまくなるよ🌱` }
    : { emoji: "😢", title: "またちょうせんしよう！", msg: "むずかしかったね。もういちどやってみよう！" };
  document.getElementById("resultEmoji").textContent = r.emoji;
  document.getElementById("resultTitle").textContent = r.title;
  document.getElementById("resultScore").textContent = `${score} / ${quizData.length}`;
  document.getElementById("resultMsg").textContent = r.msg;
}

function restart() {
  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>
</body>
</html>
